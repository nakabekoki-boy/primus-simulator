<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primus 収益シミュレーター</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6;
    --border: rgba(0,0,0,0.1); --text: #1a1a18; --text-muted: #7a7870;
    --accent: #2d6a4f; --warn: #b5631a; --danger: #c0392b;
    --radius: 10px; --font: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16160f; --surface:#1f1f17; --surface2:#2a2a20; --border:rgba(255,255,255,0.1); --text:#f0ede6; --text-muted:#8a8880; --accent:#52b788; }
  }
  body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; line-height:1.6; min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:13px; font-weight:600; letter-spacing:0.12em; color:var(--text-muted); text-transform:uppercase; }
  .logo span { color:var(--accent); }
  .header-tag { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; }
  .container { max-width:780px; margin:0 auto; padding:24px 16px 80px; }
  .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
  @media(max-width:500px){ .metrics{grid-template-columns:repeat(2,1fr);} }
  .metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
  .metric-label { font-size:11px; color:var(--text-muted); letter-spacing:0.06em; margin-bottom:6px; }
  .metric-val { font-size:19px; font-weight:600; color:var(--text); line-height:1.2; }
  .metric-sub { font-size:12px; color:var(--text-muted); font-weight:400; margin-left:3px; }
  .good { color:var(--accent)!important; } .warn { color:var(--warn)!important; } .bad { color:var(--danger)!important; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .card-title { font-size:11px; letter-spacing:0.1em; color:var(--text-muted); text-transform:uppercase; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .simple-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .simple-label { font-size:13px; color:var(--text-muted); min-width:130px; flex-shrink:0; }
  .simple-val { font-size:13px; font-weight:600; min-width:76px; text-align:right; color:var(--text); flex-shrink:0; }
  .slider-block { margin-bottom:14px; }
  .slider-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; gap:8px; }
  .slider-name { font-size:13px; color:var(--text-muted); flex-shrink:0; }
  .dual-val { display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .val-box { display:flex; align-items:center; gap:3px; }
  .val-box input[type=number] { width:82px; font-size:13px; font-weight:600; border:1px solid var(--border); border-radius:6px; padding:4px 7px; background:var(--surface2); color:var(--text); text-align:right; font-family:var(--font); -moz-appearance:textfield; }
  .val-box input[type=number]::-webkit-inner-spin-button, .val-box input[type=number]::-webkit-outer-spin-button { opacity:1; }
  .val-box input[type=number]:focus { outline:none; border-color:var(--accent); }
  .val-box input[readonly] { color:var(--text-muted); background:var(--bg); }
  .unit { font-size:12px; color:var(--text-muted); }
  .val-sep { font-size:12px; color:var(--border); }
  input[type=range] { width:100%; height:4px; -webkit-appearance:none; appearance:none; background:var(--surface2); border-radius:2px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); border:2px solid var(--surface); box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }
  input[type=range]::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:var(--accent); border:2px solid var(--surface); cursor:pointer; }
  .chart-wrap { width:100%; overflow:visible; margin-top:8px; }
  .chart-wrap svg { width:100%; display:block; }
  footer { text-align:center; font-size:11px; color:var(--text-muted); padding:32px 16px; letter-spacing:0.06em; }
</style>
</head>
<body>
<header>
  <div class="logo">Primus <span>wellness kitchen</span></div>
  <div class="header-tag">収益シミュレーター</div>
</header>
<div class="container">
  <div class="metrics" id="metrics"></div>

  <div class="card">
    <div class="card-title">店舗設定</div>
    <div class="simple-row">
      <span class="simple-label">営業日数（月）</span>
      <input type="range" id="days" min="15" max="28" step="1" value="22" style="flex:1;">
      <span class="simple-val" id="days-out">22日</span>
    </div>
    <div class="simple-row">
      <span class="simple-label">平日 客単価</span>
      <input type="range" id="weekday-price" min="800" max="2500" step="50" value="1200" style="flex:1;">
      <span class="simple-val" id="weekday-price-out">¥1,200</span>
    </div>
    <div class="simple-row">
      <span class="simple-label">土日 客単価</span>
      <input type="range" id="weekend-price" min="800" max="2500" step="50" value="1400" style="flex:1;">
      <span class="simple-val" id="weekend-price-out">¥1,400</span>
    </div>
    <div class="simple-row">
      <span class="simple-label">平日 来客数/日</span>
      <input type="range" id="weekday-guests" min="5" max="50" step="1" value="18" style="flex:1;">
      <span class="simple-val" id="weekday-guests-out">18人</span>
    </div>
    <div class="simple-row">
      <span class="simple-label">土日 来客数/日</span>
      <input type="range" id="weekend-guests" min="5" max="60" step="1" value="28" style="flex:1;">
      <span class="simple-val" id="weekend-guests-out">28人</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">物販・その他収入</div>
    <div class="simple-row">
      <span class="simple-label">物販 月売上</span>
      <input type="range" id="retail" min="0" max="200000" step="5000" value="30000" style="flex:1;">
      <span class="simple-val" id="retail-out">¥30,000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">コスト設定（金額 ↔ 率 連動）</div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">原価</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="cogs-yen" value="0" min="0" max="9999999" step="1000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="cogs-pct" value="30" min="0" max="80" step="1"><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="cogs-pct-range" min="0" max="80" step="1" value="30">
    </div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">固定費（家賃等）</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="fixed-yen" value="280000" min="0" max="9999999" step="10000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="fixed-pct" value="0" min="0" max="100" step="1" readonly><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="fixed-yen-range" min="100000" max="500000" step="10000" value="280000">
    </div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">広告費</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="ad-yen" value="10000" min="0" max="9999999" step="1000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="ad-pct" value="0" min="0" max="100" step="0.1"><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="ad-yen-range" min="0" max="100000" step="1000" value="10000">
    </div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">消耗品・備品費</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="supplies-yen" value="8000" min="0" max="9999999" step="1000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="supplies-pct" value="0" min="0" max="100" step="0.1"><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="supplies-yen-range" min="0" max="50000" step="1000" value="8000">
    </div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">水道光熱費</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="utility-yen" value="20000" min="0" max="9999999" step="1000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="utility-pct" value="0" min="0" max="100" step="0.1"><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="utility-yen-range" min="0" max="80000" step="1000" value="20000">
    </div>

    <div class="slider-block">
      <div class="slider-top">
        <span class="slider-name">借入返済</span>
        <div class="dual-val">
          <div class="val-box"><input type="number" id="loan-yen" value="50000" min="0" max="9999999" step="5000"><span class="unit">円</span></div>
          <span class="val-sep">/</span>
          <div class="val-box"><input type="number" id="loan-pct" value="0" min="0" max="100" step="0.1"><span class="unit">%</span></div>
        </div>
      </div>
      <input type="range" id="loan-yen-range" min="0" max="150000" step="5000" value="50000">
    </div>
  </div>

  <div class="card">
    <div class="card-title">収益内訳</div>
    <div class="chart-wrap">
      <svg id="bar-chart" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
</div>
<footer>Primus wellness kitchen &amp; market — 収益シミュレーター</footer>

<script>
  const fmt = v => Math.round(v).toLocaleString('ja-JP');
  const pctFmt = v => parseFloat(v.toFixed(1));

  function calcRev() {
    const days = +document.getElementById('days').value;
    const wdPrice = +document.getElementById('weekday-price').value;
    const wePrice = +document.getElementById('weekend-price').value;
    const wdGuests = +document.getElementById('weekday-guests').value;
    const weGuests = +document.getElementById('weekend-guests').value;
    const retail = +document.getElementById('retail').value;
    const weekendDays = Math.round(days * 8 / 28);
    const weekdayDays = days - weekendDays;
    const drinkRev = weekdayDays * wdPrice * wdGuests + weekendDays * wePrice * weGuests;
    return { drinkRev, retail, totalRev: drinkRev + retail, weekdayDays, weekendDays, wdGuests, weGuests };
  }

  function syncCogs(source) {
    const { drinkRev } = calcRev();
    if (source === 'pct') {
      const pct = +document.getElementById('cogs-pct').value;
      document.getElementById('cogs-yen').value = Math.round(drinkRev * pct / 100);
      document.getElementById('cogs-pct-range').value = pct;
    } else if (source === 'yen') {
      const yen = +document.getElementById('cogs-yen').value;
      const pct = drinkRev > 0 ? pctFmt(yen / drinkRev * 100) : 0;
      document.getElementById('cogs-pct').value = pct;
      document.getElementById('cogs-pct-range').value = Math.round(pct);
    } else {
      const pct = +document.getElementById('cogs-pct-range').value;
      document.getElementById('cogs-pct').value = pct;
      document.getElementById('cogs-yen').value = Math.round(drinkRev * pct / 100);
    }
  }

  function syncFixed(source) {
    const { totalRev } = calcRev();
    let yen;
    if (source === 'yen') {
      yen = +document.getElementById('fixed-yen').value;
      document.getElementById('fixed-yen-range').value = Math.min(yen, 500000);
    } else {
      yen = +document.getElementById('fixed-yen-range').value;
      document.getElementById('fixed-yen').value = yen;
    }
    document.getElementById('fixed-pct').value = totalRev > 0 ? pctFmt(yen / totalRev * 100) : 0;
  }

  function syncYenPct(key, source) {
    const { totalRev } = calcRev();
    const yenEl = document.getElementById(key + '-yen');
    const pctEl = document.getElementById(key + '-pct');
    const rangeEl = document.getElementById(key + '-yen-range');
    if (source === 'yen') {
      const yen = +yenEl.value;
      pctEl.value = totalRev > 0 ? pctFmt(yen / totalRev * 100) : 0;
      rangeEl.value = Math.min(yen, +rangeEl.max);
    } else if (source === 'pct') {
      const yen = Math.round(totalRev * +pctEl.value / 100);
      yenEl.value = yen;
      rangeEl.value = Math.min(yen, +rangeEl.max);
    } else {
      const yen = +rangeEl.value;
      yenEl.value = yen;
      pctEl.value = totalRev > 0 ? pctFmt(yen / totalRev * 100) : 0;
    }
  }

  function profitClass(v) { return v >= 50000 ? 'good' : v >= 0 ? 'warn' : 'bad'; }

  // SVGバーチャート描画
  function drawChart(labels, values, colors) {
    const svg = document.getElementById('bar-chart');
    const W = 700, H = 260;
    const padL = 52, padR = 12, padT = 20, padB = 36;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const n = values.length;
    const barW = Math.floor(chartW / n * 0.6);
    const barGap = Math.floor(chartW / n);

    const maxV = Math.max(...values.map(Math.abs), 1);
    const scale = chartH / 2 / maxV;
    const zeroY = padT + chartH / 2;

    // 万単位ラベル用
    const tickCount = 4;
    const tickStep = Math.ceil(maxV / tickCount / 10000) * 10000;

    let html = '';

    // グリッド線＆Y軸ラベル
    for (let i = -tickCount; i <= tickCount; i++) {
      const val = i * tickStep;
      const y = Math.round(zeroY - val * scale);
      if (y < padT - 4 || y > padT + chartH + 4) continue;
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
      const textColor = isDark ? '#8a8880' : '#7a7870';
      html += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="${gridColor}" stroke-width="0.5"/>`;
      const label = val === 0 ? '0' : (val < 0 ? '-' : '') + Math.abs(val / 10000).toFixed(0) + '万';
      html += `<text x="${padL - 6}" y="${y}" text-anchor="end" dominant-baseline="central" font-size="10" fill="${textColor}" font-family="sans-serif">${label}</text>`;
    }

    // ゼロライン
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const zeroColor = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
    html += `<line x1="${padL}" y1="${zeroY}" x2="${W - padR}" y2="${zeroY}" stroke="${zeroColor}" stroke-width="1"/>`;

    // バー
    values.forEach((val, i) => {
      const cx = padL + barGap * i + barGap / 2;
      const bx = cx - barW / 2;
      const bh = Math.max(Math.abs(val) * scale, 2);
      const by = val >= 0 ? zeroY - bh : zeroY;
      const textColor = isDark ? '#8a8880' : '#7a7870';

      html += `<rect x="${Math.round(bx)}" y="${Math.round(by)}" width="${barW}" height="${Math.round(bh)}" rx="3" fill="${colors[i]}"/>`;
      // X軸ラベル
      html += `<text x="${Math.round(cx)}" y="${H - padB + 14}" text-anchor="middle" font-size="10" fill="${textColor}" font-family="sans-serif">${labels[i]}</text>`;
      // バー上の金額ラベル（小さく）
      const labelY = val >= 0 ? Math.round(by) - 3 : Math.round(by + bh) + 11;
      const shortVal = Math.abs(val) >= 10000 ? (Math.abs(val) / 10000).toFixed(0) + '万' : Math.abs(val).toLocaleString('ja-JP');
      html += `<text x="${Math.round(cx)}" y="${labelY}" text-anchor="middle" font-size="9" fill="${textColor}" font-family="sans-serif">${shortVal}</text>`;
    });

    svg.innerHTML = html;
  }

  function render() {
    const { drinkRev, retail, totalRev, weekdayDays, weekendDays, wdGuests, weGuests } = calcRev();
    const cogs = +document.getElementById('cogs-yen').value;
    const fixed = +document.getElementById('fixed-yen').value;
    const ad = +document.getElementById('ad-yen').value;
    const supplies = +document.getElementById('supplies-yen').value;
    const utility = +document.getElementById('utility-yen').value;
    const loan = +document.getElementById('loan-yen').value;

    const grossProfit = totalRev - cogs;
    const sgaTotal = fixed + ad + supplies + utility;
    const opProfit = grossProfit - sgaTotal;
    const netProfit = opProfit - loan;
    const grossMargin = totalRev > 0 ? Math.round(grossProfit / totalRev * 100) : 0;
    const totalGuests = weekdayDays * wdGuests + weekendDays * weGuests;

    syncCogs('pct');
    syncFixed('yen');
    ['ad','supplies','utility','loan'].forEach(k => syncYenPct(k, 'yen'));

    document.getElementById('metrics').innerHTML = `
      <div class="metric"><div class="metric-label">月間売上</div><div class="metric-val">¥${fmt(totalRev)}</div></div>
      <div class="metric"><div class="metric-label">粗利益</div><div class="metric-val ${grossMargin >= 60 ? 'good' : 'warn'}">¥${fmt(grossProfit)}<span class="metric-sub">${grossMargin}%</span></div></div>
      <div class="metric"><div class="metric-label">販管費合計</div><div class="metric-val">¥${fmt(sgaTotal)}</div></div>
      <div class="metric"><div class="metric-label">営業利益</div><div class="metric-val ${profitClass(opProfit)}">¥${fmt(opProfit)}</div></div>
      <div class="metric"><div class="metric-label">返済後利益</div><div class="metric-val ${profitClass(netProfit)}">¥${fmt(netProfit)}</div></div>
      <div class="metric"><div class="metric-label">月間来客数</div><div class="metric-val">${fmt(totalGuests)}<span class="metric-sub">人</span></div></div>
    `;

    const labels = ['飲食売上','物販','原価','固定費','広告費','消耗品','光熱費','返済'];
    const values = [drinkRev, retail, -cogs, -fixed, -ad, -supplies, -utility, -loan];
    const colors = ['#2d6a4f','#52b788','#c0392b','#7a7870','#b5631a','#d4a017','#e8c96a','#e07b54'];
    drawChart(labels, values, colors);
  }

  // シンプルスライダー
  [['days','日'],['weekday-price','¥'],['weekend-price','¥'],['weekday-guests','人'],['weekend-guests','人'],['retail','¥']].forEach(([id, unit]) => {
    document.getElementById(id).addEventListener('input', () => {
      const v = +document.getElementById(id).value;
      document.getElementById(id + '-out').textContent = unit === '¥' ? '¥' + v.toLocaleString('ja-JP') : v + unit;
      render();
    });
  });

  document.getElementById('cogs-pct').addEventListener('input', () => { syncCogs('pct'); render(); });
  document.getElementById('cogs-yen').addEventListener('input', () => { syncCogs('yen'); render(); });
  document.getElementById('cogs-pct-range').addEventListener('input', () => { syncCogs('range'); render(); });
  document.getElementById('fixed-yen').addEventListener('input', () => { syncFixed('yen'); render(); });
  document.getElementById('fixed-yen-range').addEventListener('input', () => { syncFixed('range'); render(); });

  ['ad','supplies','utility','loan'].forEach(key => {
    document.getElementById(key + '-yen').addEventListener('input', () => { syncYenPct(key, 'yen'); render(); });
    document.getElementById(key + '-pct').addEventListener('input', () => { syncYenPct(key, 'pct'); render(); });
    document.getElementById(key + '-yen-range').addEventListener('input', () => { syncYenPct(key, 'range'); render(); });
  });

  render();
</script>
</body>
</html>
